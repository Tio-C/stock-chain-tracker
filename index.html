function fmtM(n){if(!n)return'$0';if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n;}
function fmtP(p,d=1){if(p===null||p===undefined)return'—';return(p>=0?'+':'')+p.toFixed(d)+'%';}

if(typeof PORTAL_DATA==='undefined'){
  document.getElementById('cardsArea').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:#555;">请先运行 run.sh 生成数据</div>';
} else {
  const P=PORTAL_DATA;
  document.getElementById('updTime').textContent=P.updated_at;
  document.getElementById('updSub').textContent='数据源: Yahoo Finance · 最近更新: '+P.updated_at;

  // Ticker
  const allTickers=[];
  Object.values(P.industries).forEach(ind=>{
    (ind.top10_gainers_1d||[]).slice(0,3).forEach(([t,c])=>allTickers.push({l:ind.icon+t,v:fmtP(c),up:c>=0}));
    (ind.anomalies||[]).slice(0,2).forEach(([t,r,c])=>allTickers.push({l:'⚡'+t+' '+r+'x',v:fmtP(c),up:c>=0}));
  });
  const doubled=[...allTickers,...allTickers];
  const ti=document.getElementById('tickerInner');
  doubled.forEach(it=>{ const el=document.createElement('span'); el.className='ticker-item'; el.innerHTML=it.l+' <span class="'+(it.up?'t-up':'t-dn')+'">'+it.v+'</span>'; ti.appendChild(el); });

  // 行业卡片
  const cards=document.getElementById('cardsArea');
  const indKeys=Object.keys(P.industries);
  const totalAll=indKeys.reduce((s,k)=>s+(P.industries[k].total_r5d_dollar||0),0);
  indKeys.forEach(k=>{
    const ind=P.industries[k];
    const a=document.createElement('a'); a.className='card'; a.href=ind.output; a.style.borderLeftColor=ind.color;
    const g0=ind.top10_gainers_1d&&ind.top10_gainers_1d[0]?ind.top10_gainers_1d[0]:['—',0];
    const l0=ind.top10_losers_1d&&ind.top10_losers_1d[0]?ind.top10_losers_1d[0]:['—',0];
    a.innerHTML=`<div class="c-top"><span class="c-ic">${ind.icon}</span><div><div class="c-nm">${ind.name}</div><div class="c-st">${ind.sector_count}板块·${ind.stock_count}只</div></div></div>
<div class="c-money">${fmtM(ind.total_r5d_dollar)}</div><div class="c-lbl">5日总成交额</div>
<div class="c-stats"><div>22日: <b>${fmtM(ind.total_r22d_dollar)}</b></div><div>领涨: <b style="color:#4ade80">${g0[0]} ${fmtP(g0[1])}</b></div><div>领跌: <b style="color:#f87171">${l0[0]} ${fmtP(l0[1])}</b></div></div>`;
    cards.appendChild(a);
  });

  // 饼图
  new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:indKeys.map(k=>P.industries[k].icon+' '+P.industries[k].name),datasets:[{data:indKeys.map(k=>P.industries[k].total_r5d_dollar),backgroundColor:indKeys.map(k=>P.industries[k].color),borderColor:'#0f0e0c',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#888',font:{size:9},padding:8}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmtM(c.parsed)} (${(c.parsed/totalAll*100).toFixed(1)}%)`}}}}});
  // 行业统计列表
  const is=document.getElementById('indStats');
  indKeys.forEach(k=>{
    const ind=P.industries[k];
    const pct=totalAll>0?(ind.total_r5d_dollar/totalAll*100).toFixed(1):'0';
    const d=document.createElement('div'); d.className='ind-stat'; d.style.borderLeftColor=ind.color;
    // TOP10 资金活跃股票
    const top10 = ind.money_top10 || [];
    let topHtml = '';
    if (top10.length > 0) {
      topHtml = '<div class="ind-top10"><div class="ind-top-h">💰 资金活跃 TOP10</div>';
      top10.forEach(([t, m, c], i) => {
        const cls = c >= 0 ? 'h-up' : 'h-dn';
        topHtml += `<div class="ind-top-row">
          <span class="rk">${i+1}</span>
          <a class="tk" href="${ind.output}#${t}">${t}</a>
          <span class="am">${fmtM(m)}</span>
          <span class="pc ${cls}">${fmtP(c)}</span>
        </div>`;
      });
      topHtml += '</div>';
    }
    d.innerHTML=`<div class="nm">${ind.icon} ${ind.name} <span style="font-size:10px;color:#888;">${pct}%</span></div><div class="amt">${fmtM(ind.total_r5d_dollar)}</div><div class="sub">${ind.stock_count}只·${ind.sector_count}板块</div>${topHtml}`;
    is.appendChild(d);
  });

  // 板块热度
  const allSecs=[];
  indKeys.forEach(k=>{ (P.industries[k].sectors_brief||[]).forEach(s=>allSecs.push({...s,indIcon:P.industries[k].icon})); });
  allSecs.sort((a,b)=>(b.r5d_dollar||0)-(a.r5d_dollar||0));
  const hg=document.getElementById('heatGrid');
  allSecs.slice(0,12).forEach(s=>{
    const wow=s.wow; const c1=s.avg_chg_1d;
    const el=document.createElement('div'); el.className='heat-item'; el.style.borderLeftColor=s.color;
    el.innerHTML=`<div class="heat-nm">${s.icon||s.indIcon} ${s.name}</div><div class="heat-amt">${fmtM(s.r5d_dollar||0)}</div><div class="heat-sub ${wow===null?'h-neu':(wow>=0?'h-up':'h-dn')}">环比${fmtP(wow)} 今日${fmtP(c1)}</div>`;
    hg.appendChild(el);
  });

  // 跨行业排行
  function mkCross(id,items,type){
    const el=document.getElementById(id); el.innerHTML='';
    (items||[]).slice(0,10).forEach((item,i)=>{
      const row=document.createElement('div'); row.className='cross-item';
      if(type==='anomaly'){
        const [t,r,c,indName]=item;
        row.innerHTML=`<span class="c-rank">${i+1}</span><span class="c-tkr">${t}</span><span class="c-ind">${indName||''}</span><span class="c-pct ${c>=0?'h-up':'h-dn'}">${r}x</span>`;
      } else if(type==='money'){
        const [t,m,c,indName]=item;
        row.innerHTML=`<span class="c-rank">${i+1}</span><span class="c-tkr">${t}</span><span class="c-ind">${fmtM(m)}</span><span class="c-pct ${c>=0?'h-up':'h-dn'}">${fmtP(c)}</span>`;
      } else {
        const [t,c,indName]=item;
        row.innerHTML=`<span class="c-rank">${i+1}</span><span class="c-tkr">${t}</span><span class="c-ind">${indName||''}</span><span class="c-pct ${c>=0?'h-up':'h-dn'}">${fmtP(c)}</span>`;
      }
      el.appendChild(row);
    });
  }
  const allG1=[],allL1=[],allM=[],allA=[];
  indKeys.forEach(k=>{
    const ind=P.industries[k];
    (ind.top10_gainers_1d||[]).forEach(([t,c])=>allG1.push([t,c,ind.name]));
    (ind.top10_losers_1d||[]).forEach(([t,c])=>allL1.push([t,c,ind.name]));
    (ind.money_top10||[]).forEach(([t,m,c])=>allM.push([t,m,c,ind.name]));
    (ind.anomalies||[]).forEach(([t,r,c])=>allA.push([t,r,c,ind.name]));
  });
  allG1.sort((a,b)=>b[1]-a[1]); allL1.sort((a,b)=>a[1]-b[1]);
  allM.sort((a,b)=>b[1]-a[1]); allA.sort((a,b)=>b[1]-a[1]);
  mkCross('cross1dGain',allG1,'pct'); mkCross('cross1dLoss',allL1,'pct');
  mkCross('crossMoney',allM,'money'); mkCross('crossAnomaly',allA,'anomaly');
}
